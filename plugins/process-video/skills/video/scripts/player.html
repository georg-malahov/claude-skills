<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f0f; color: #e8e8e8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.5; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
.player-wrap { position: relative; width: 100%; background: #000; border-radius: 8px; overflow: hidden; }
video { width: 100%; display: block; }
.meta { padding: 20px 0; }
.title { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
.description { color: #aaa; font-size: 0.95rem; margin-bottom: 20px; }
.chapters { border-top: 1px solid #2a2a2a; padding-top: 16px; }
.chapters h3 { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.chapter { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
.chapter:hover { background: #1a1a1a; }
.chapter.active { background: #1e2a1e; }
.chapter-time { font-size: 0.85rem; color: #5c9aff; font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 48px; }
.chapter-label { font-size: 0.9rem; }
.passcode-overlay { position: fixed; inset: 0; background: #0f0f0f; display: flex; align-items: center; justify-content: center; z-index: 100; }
.passcode-box { text-align: center; max-width: 360px; padding: 40px; }
.passcode-box h2 { margin-bottom: 8px; font-size: 1.2rem; }
.passcode-box p { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
.passcode-input { width: 100%; padding: 12px 16px; font-size: 1rem; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #e8e8e8; text-align: center; letter-spacing: 0.15em; outline: none; }
.passcode-input:focus { border-color: #5c9aff; }
.passcode-input.error { border-color: #ff4444; animation: shake 0.3s; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
.passcode-btn { margin-top: 16px; padding: 10px 32px; background: #5c9aff; color: #fff; border: none; border-radius: 6px; font-size: 0.95rem; cursor: pointer; }
.passcode-btn:hover { background: #4a88ee; }
.downloads { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.download-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #e8e8e8; text-decoration: none; font-size: 0.85rem; transition: background 0.15s, border-color 0.15s; }
.download-btn:hover { background: #252525; border-color: #5c9aff; }
.download-btn svg { width: 16px; height: 16px; fill: currentColor; }
.download-original { color: #888; border-color: #2a2a2a; }
.download-original:hover { color: #e8e8e8; }
.skill-footer { margin-top: 32px; padding: 20px 0; border-top: 1px solid #2a2a2a; text-align: center; color: #666; font-size: 0.8rem; }
.skill-footer a { color: #5c9aff; text-decoration: none; border-bottom: 1px dashed #5c9aff44; }
.skill-footer a:hover { color: #7db4ff; }

/* Developer Analysis section */
.analysis { border-top: 1px solid #2a2a2a; padding-top: 32px; margin-top: 8px; }
.analysis-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; cursor: pointer; }
.analysis-header h2 { font-size: 1.2rem; font-weight: 600; }
.analysis-toggle { color: #888; font-size: 0.85rem; user-select: none; }
.analysis blockquote { border-left: 3px solid #333; padding: 8px 16px; color: #999; font-size: 0.9rem; margin-bottom: 24px; }
.analysis hr { border: none; border-top: 1px solid #2a2a2a; margin: 28px 0; }
.analysis h2 { font-size: 1.15rem; font-weight: 600; margin: 28px 0 16px; color: #e8e8e8; }
.analysis h3 { font-size: 0.95rem; font-weight: 600; margin: 20px 0 8px; color: #ddd; }
.analysis ul, .analysis ol { padding-left: 20px; margin: 8px 0 16px; }
.analysis li { margin: 4px 0; font-size: 0.9rem; color: #ccc; }
.analysis li strong { color: #e8e8e8; }
.analysis .timestamp { color: #5c9aff; cursor: pointer; text-decoration: none; border-bottom: 1px dashed #5c9aff44; padding: 1px 4px; border-radius: 3px; font-variant-numeric: tabular-nums; transition: background 0.15s, color 0.15s; }
.analysis .timestamp:hover { background: #5c9aff22; color: #7db4ff; }
.analysis .severity-high { color: #ff6b6b; font-weight: 600; }
.analysis .severity-mittel { color: #ffa94d; font-weight: 600; }
.analysis .severity-niedrig { color: #69db7c; font-weight: 600; }
.analysis .severity-critical { color: #ff4444; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.03em; }
.analysis .task-list { list-style: none; padding-left: 4px; }
.analysis .task-list li { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; }
.analysis .task-list li::before { content: ""; display: inline-block; width: 16px; height: 16px; min-width: 16px; border: 1.5px solid #555; border-radius: 3px; margin-top: 2px; }
.analysis .priority-section { margin: 20px 0; padding: 16px; border-radius: 8px; }
.analysis .priority-critical { background: #2a1515; border: 1px solid #441111; }
.analysis .priority-high { background: #2a2015; border: 1px solid #443311; }
.analysis .priority-medium { background: #1a1a1a; border: 1px solid #333; }
.analysis .priority-low { background: #151a15; border: 1px solid #1a331a; }
.analysis .priority-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-bottom: 10px; }
.analysis .summary-box { background: #1a1a2a; border: 1px solid #2a2a44; border-radius: 8px; padding: 20px; margin-top: 16px; }
.analysis .summary-box ol, .analysis .summary-box ul { margin: 8px 0; }
.analysis .question-list { counter-reset: question; list-style: none; padding-left: 0; }
.analysis .question-list li { counter-increment: question; padding: 10px 14px; margin: 6px 0; background: #1a1a1a; border-radius: 6px; border-left: 3px solid #5c9aff; }
.analysis .question-list li::before { content: counter(question) "."; color: #5c9aff; font-weight: 600; margin-right: 8px; }

@media (max-width: 640px) { .container { padding: 12px 8px; } .title { font-size: 1.1rem; } .analysis h2 { font-size: 1rem; } }
</style>
</head>
<body>

<!-- Passcode gate (only rendered if PASSCODE_HASH is set) -->
<div class="passcode-overlay" id="passcodeOverlay" style="display:none">
  <div class="passcode-box">
    <h2>This video is protected</h2>
    <p>Enter the passcode to view</p>
    <input type="password" class="passcode-input" id="passcodeInput" placeholder="Passcode" autocomplete="off">
    <br>
    <button class="passcode-btn" id="passcodeBtn">View</button>
  </div>
</div>

<div class="container" id="mainContent" style="display:none">
  <div class="player-wrap">
    <video id="videoPlayer" controls preload="metadata">
      <source src="{{VIDEO_FILENAME}}" type="video/mp4">
      {{SUBTITLE_TRACKS}}
    </video>
  </div>
  <div class="meta">
    <div class="title">{{TITLE}}</div>
    <div class="description">{{DESCRIPTION}}</div>
    <div class="downloads">{{DOWNLOAD_BUTTON}}{{ORIGINAL_DOWNLOAD}}</div>
    <div class="chapters" id="chaptersSection" style="display:none">
      <h3>Chapters</h3>
      <div id="chaptersList"></div>
    </div>
  </div>
{{ANALYSIS_BLOCK}}
  <div class="skill-footer">
    Generated with the <a href="https://github.com/georg-malahov/claude-skills" target="_blank" rel="noopener">process-video</a> Claude Code skill
  </div>
</div>

<script>
(function() {
  var PASSCODE_HASH = "{{PASSCODE_HASH}}";
  var CHAPTERS = {{CHAPTERS_JSON}};

  // Simple hash for passcode comparison (not cryptographic — client-side only)
  function simpleHash(str) {
    var hash = 0;
    for (var i = 0; i < str.length; i++) {
      var c = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + c;
      hash |= 0;
    }
    return String(hash);
  }

  // Passcode gate
  var overlay = document.getElementById("passcodeOverlay");
  var content = document.getElementById("mainContent");

  if (PASSCODE_HASH && PASSCODE_HASH !== "") {
    overlay.style.display = "flex";
    content.style.display = "none";

    var input = document.getElementById("passcodeInput");
    var btn = document.getElementById("passcodeBtn");

    function checkPasscode() {
      if (simpleHash(input.value) === PASSCODE_HASH) {
        overlay.style.display = "none";
        content.style.display = "block";
      } else {
        input.classList.add("error");
        setTimeout(function() { input.classList.remove("error"); }, 400);
      }
    }

    btn.addEventListener("click", checkPasscode);
    input.addEventListener("keydown", function(e) { if (e.key === "Enter") checkPasscode(); });
    input.focus();
  } else {
    overlay.style.display = "none";
    content.style.display = "block";
  }

  // Chapters
  var video = document.getElementById("videoPlayer");
  var chaptersSection = document.getElementById("chaptersSection");
  var chaptersList = document.getElementById("chaptersList");

  if (CHAPTERS && CHAPTERS.length > 0) {
    chaptersSection.style.display = "block";

    CHAPTERS.forEach(function(ch, idx) {
      var el = document.createElement("div");
      el.className = "chapter";
      el.dataset.time = ch.time;
      el.innerHTML = '<span class="chapter-time">' + formatTime(ch.time) + '</span><span class="chapter-label">' + escapeHtml(ch.label) + '</span>';
      el.addEventListener("click", function() {
        video.currentTime = ch.time;
        video.play();
      });
      chaptersList.appendChild(el);
    });

    video.addEventListener("timeupdate", function() {
      var t = video.currentTime;
      var items = chaptersList.querySelectorAll(".chapter");
      var activeIdx = 0;
      for (var i = CHAPTERS.length - 1; i >= 0; i--) {
        if (t >= CHAPTERS[i].time) { activeIdx = i; break; }
      }
      items.forEach(function(el, idx) {
        el.classList.toggle("active", idx === activeIdx);
      });
    });
  }

  // Clickable timestamps in analysis (no-op when no analysis block)
  document.querySelectorAll(".analysis .timestamp").forEach(function(el) {
    el.addEventListener("click", function(e) {
      e.preventDefault();
      var time = parseInt(el.dataset.time, 10);
      if (isNaN(time)) return;
      video.currentTime = time;
      video.play();
      video.scrollIntoView({ behavior: "smooth", block: "center" });
    });
  });

  // Toggle developer analysis section (no-op when no analysis block)
  window.toggleAnalysis = function() {
    var c = document.getElementById("analysisContent");
    var t = document.getElementById("analysisToggle");
    if (!c || !t) return;
    if (c.style.display === "none") {
      c.style.display = "block";
      t.textContent = "[ " + (t.dataset.collapse || "Collapse") + " ]";
    } else {
      c.style.display = "none";
      t.textContent = "[ " + (t.dataset.expand || "Expand") + " ]";
    }
  };

  function formatTime(secs) {
    var m = Math.floor(secs / 60);
    var s = Math.floor(secs % 60);
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  function escapeHtml(str) {
    var d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
